    <text x="190" y="-12" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#b91c1c">前侧 USB-C</text>
  </g>

  <g transform="translate(70,625)">
    <path d="M540 0 L660 0" stroke="#475569" stroke-width="4" marker-end="url(#arrow)"/>
    <text x="600" y="-12" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" fill="#334155">M3×12 螺丝 + 10mm 支柱</text>
    <path d="M860 0 L980 0" stroke="#475569" stroke-width="4" marker-end="url(#arrow)"/>
    <text x="920" y="-12" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" fill="#334155">最后再接 USB</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto"><path d="M0,0 L0,6 L9,3 z" fill="#475569"/></marker>
  </defs>
