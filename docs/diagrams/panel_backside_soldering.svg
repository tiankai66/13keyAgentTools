<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1120" viewBox="0 0 1600 1120">
  <rect width="1600" height="1120" fill="#f8fafc"/>
  <text x="55" y="62" font-family="Arial, sans-serif" font-size="40" font-weight="700" fill="#111827">真实焊接位置图：把上层面板翻到背面</text>
  <text x="55" y="103" font-family="Arial, sans-serif" font-size="23" fill="#475569">黑色是按键本体，银色圆点是按键的两个针脚；黄色小元件是二极管。按这张图摆线即可。</text>

  <!-- physical panel -->
  <rect x="55" y="150" width="990" height="820" rx="28" fill="#e5e7eb" stroke="#374151" stroke-width="5"/>
  <text x="550" y="190" font-family="Arial, sans-serif" font-size="25" font-weight="700" text-anchor="middle" fill="#374151">面板背面 / 焊接面</text>
  <path d="M550 205 V235" stroke="#dc2626" stroke-width="5" marker-end="url(#arrow-red)"/>
  <text x="550" y="232" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#b91c1c">翻面后，按键针脚朝上</text>

  <!-- row wires at left -->
  <g stroke="#f97316" stroke-width="10" stroke-linecap="round" fill="none">
    <path d="M130 330 H230"/><path d="M130 480 H740"/><path d="M130 630 H740"/><path d="M130 780 H740"/>
  </g>
  <g font-family="Arial, sans-serif" font-size="25" font-weight="700" text-anchor="end" fill="#c2410c">
    <text x="120" y="338">行 D4</text><text x="120" y="488">行 D5</text><text x="120" y="638">行 D6</text><text x="120" y="788">行 D7</text>
  </g>

  <!-- column wires at bottom -->
  <g stroke="#2563eb" stroke-width="10" stroke-linecap="round" fill="none">
    <path d="M365 835 V900"/><path d="M530 835 V900"/><path d="M695 835 V900"/><path d="M860 835 V900"/>
    <path d="M365 330 V900"/><path d="M530 480 V900"/><path d="M695 480 V900"/><path d="M860 480 V900"/>
  </g>
  <g font-family="Arial, sans-serif" font-size="23" font-weight="700" text-anchor="middle" fill="#1d4ed8">
    <text x="310" y="935">列 D8</text><text x="475" y="935">列 D9</text><text x="640" y="935">列 D10</text><text x="805" y="935">列 D11</text>
  </g>

  <!-- key helper: each key has left diode and right column pin -->
  <!-- A -->
  <g>
    <rect x="270" y="290" width="80" height="80" rx="12" fill="#1f2937" stroke="#111827" stroke-width="4"/>
    <circle cx="255" cy="330" r="12" fill="#e5e7eb" stroke="#111827" stroke-width="4"/><circle cx="365" cy="330" r="12" fill="#e5e7eb" stroke="#111827" stroke-width="4"/>
    <text x="310" y="338" font-family="Arial, sans-serif" font-size="25" font-weight="700" text-anchor="middle" fill="#ffffff">A</text>
    <rect x="205" y="318" width="36" height="24" rx="5" fill="#fbbf24" stroke="#92400e" stroke-width="3"/><line x1="230" y1="313" x2="230" y2="347" stroke="#111827" stroke-width="7"/>
    <line x1="241" y1="330" x2="243" y2="330" stroke="#f97316" stroke-width="8"/>
    <line x1="255" y1="330" x2="241" y2="330" stroke="#374151" stroke-width="6"/>
    <line x1="255" y1="330" x2="230" y2="330" stroke="#f97316" stroke-width="6"/>
  </g>

  <!-- row 1 B-E -->
  <g>
    <rect x="270" y="440" width="80" height="80" rx="12" fill="#1f2937" stroke="#111827" stroke-width="4"/><circle cx="255" cy="480" r="12" fill="#e5e7eb" stroke="#111827" stroke-width="4"/><circle cx="365" cy="480" r="12" fill="#e5e7eb" stroke="#111827" stroke-width="4"/><text x="310" y="488" font-family="Arial, sans-serif" font-size="25" font-weight="700" text-anchor="middle" fill="#ffffff">B</text><rect x="205" y="468" width="36" height="24" rx="5" fill="#fbbf24" stroke="#92400e" stroke-width="3"/><line x1="230" y1="463" x2="230" y2="497" stroke="#111827" stroke-width="7"/><line x1="255" y1="480" x2="241" y2="480" stroke="#374151" stroke-width="6"/>
    <rect x="435" y="440" width="80" height="80" rx="12" fill="#1f2937" stroke="#111827" stroke-width="4"/><circle cx="420" cy="480" r="12" fill="#e5e7eb" stroke="#111827" stroke-width="4"/><circle cx="530" cy="480" r="12" fill="#e5e7eb" stroke="#111827" stroke-width="4"/><text x="475" y="488" font-family="Arial, sans-serif" font-size="25" font-weight="700" text-anchor="middle" fill="#ffffff">C</text><rect x="370" y="468" width="36" height="24" rx="5" fill="#fbbf24" stroke="#92400e" stroke-width="3"/><line x1="395" y1="463" x2="395" y2="497" stroke="#111827" stroke-width="7"/><line x1="420" y1="480" x2="406" y2="480" stroke="#374151" stroke-width="6"/>
    <rect x="600" y="440" width="80" height="80" rx="12" fill="#1f2937" stroke="#111827" stroke-width="4"/><circle cx="585" cy="480" r="12" fill="#e5e7eb" stroke="#111827" stroke-width="4"/><circle cx="695" cy="480" r="12" fill="#e5e7eb" stroke="#111827" stroke-width="4"/><text x="640" y="488" font-family="Arial, sans-serif" font-size="25" font-weight="700" text-anchor="middle" fill="#ffffff">D</text><rect x="550" y="468" width="36" height="24" rx="5" fill="#fbbf24" stroke="#92400e" stroke-width="3"/><line x1="575" y1="463" x2="575" y2="497" stroke="#111827" stroke-width="7"/><line x1="585" y1="480" x2="586" y2="480" stroke="#374151" stroke-width="6"/>
    <rect x="765" y="440" width="80" height="80" rx="12" fill="#1f2937" stroke="#111827" stroke-width="4"/><circle cx="750" cy="480" r="12" fill="#e5e7eb" stroke="#111827" stroke-width="4"/><circle cx="860" cy="480" r="12" fill="#e5e7eb" stroke="#111827" stroke-width="4"/><text x="805" y="488" font-family="Arial, sans-serif" font-size="25" font-weight="700" text-anchor="middle" fill="#ffffff">E</text><rect x="715" y="468" width="36" height="24" rx="5" fill="#fbbf24" stroke="#92400e" stroke-width="3"/><line x1="740" y1="463" x2="740" y2="497" stroke="#111827" stroke-width="7"/><line x1="750" y1="480" x2="751" y2="480" stroke="#374151" stroke-width="6"/>
  </g>

  <!-- row 2 F-I -->
  <g>
    <rect x="270" y="590" width="80" height="80" rx="12" fill="#1f2937" stroke="#111827" stroke-width="4"/><circle cx="255" cy="630" r="12" fill="#e5e7eb" stroke="#111827" stroke-width="4"/><circle cx="365" cy="630" r="12" fill="#e5e7eb" stroke="#111827" stroke-width="4"/><text x="310" y="638" font-family="Arial, sans-serif" font-size="25" font-weight="700" text-anchor="middle" fill="#ffffff">F</text><rect x="205" y="618" width="36" height="24" rx="5" fill="#fbbf24" stroke="#92400e" stroke-width="3"/><line x1="230" y1="613" x2="230" y2="647" stroke="#111827" stroke-width="7"/><line x1="255" y1="630" x2="241" y2="630" stroke="#374151" stroke-width="6"/>
    <rect x="435" y="590" width="80" height="80" rx="12" fill="#1f2937" stroke="#111827" stroke-width="4"/><circle cx="420" cy="630" r="12" fill="#e5e7eb" stroke="#111827" stroke-width="4"/><circle cx="530" cy="630" r="12" fill="#e5e7eb" stroke="#111827" stroke-width="4"/><text x="475" y="638" font-family="Arial, sans-serif" font-size="25" font-weight="700" text-anchor="middle" fill="#ffffff">G</text><rect x="370" y="618" width="36" height="24" rx="5" fill="#fbbf24" stroke="#92400e" stroke-width="3"/><line x1="395" y1="613" x2="395" y2="647" stroke="#111827" stroke-width="7"/><line x1="420" y1="630" x2="406" y2="630" stroke="#374151" stroke-width="6"/>
    <rect x="600" y="590" width="80" height="80" rx="12" fill="#1f2937" stroke="#111827" stroke-width="4"/><circle cx="585" cy="630" r="12" fill="#e5e7eb" stroke="#111827" stroke-width="4"/><circle cx="695" cy="630" r="12" fill="#e5e7eb" stroke="#111827" stroke-width="4"/><text x="640" y="638" font-family="Arial, sans-serif" font-size="25" font-weight="700" text-anchor="middle" fill="#ffffff">H</text><rect x="550" y="618" width="36" height="24" rx="5" fill="#fbbf24" stroke="#92400e" stroke-width="3"/><line x1="575" y1="613" x2="575" y2="647" stroke="#111827" stroke-width="7"/><line x1="585" y1="630" x2="586" y2="630" stroke="#374151" stroke-width="6"/>
    <rect x="765" y="590" width="80" height="80" rx="12" fill="#1f2937" stroke="#111827" stroke-width="4"/><circle cx="750" cy="630" r="12" fill="#e5e7eb" stroke="#111827" stroke-width="4"/><circle cx="860" cy="630" r="12" fill="#e5e7eb" stroke="#111827" stroke-width="4"/><text x="805" y="638" font-family="Arial, sans-serif" font-size="25" font-weight="700" text-anchor="middle" fill="#ffffff">I</text><rect x="715" y="618" width="36" height="24" rx="5" fill="#fbbf24" stroke="#92400e" stroke-width="3"/><line x1="740" y1="613" x2="740" y2="647" stroke="#111827" stroke-width="7"/><line x1="750" y1="630" x2="751" y2="630" stroke="#374151" stroke-width="6"/>
  </g>

  <!-- row 3 J-M -->
  <g>
    <rect x="270" y="740" width="80" height="80" rx="12" fill="#1f2937" stroke="#111827" stroke-width="4"/><circle cx="255" cy="780" r="12" fill="#e5e7eb" stroke="#111827" stroke-width="4"/><circle cx="365" cy="780" r="12" fill="#e5e7eb" stroke="#111827" stroke-width="4"/><text x="310" y="788" font-family="Arial, sans-serif" font-size="25" font-weight="700" text-anchor="middle" fill="#ffffff">J</text><rect x="205" y="768" width="36" height="24" rx="5" fill="#fbbf24" stroke="#92400e" stroke-width="3"/><line x1="230" y1="763" x2="230" y2="797" stroke="#111827" stroke-width="7"/><line x1="255" y1="780" x2="241" y2="780" stroke="#374151" stroke-width="6"/>
    <rect x="435" y="740" width="80" height="80" rx="12" fill="#1f2937" stroke="#111827" stroke-width="4"/><circle cx="420" cy="780" r="12" fill="#e5e7eb" stroke="#111827" stroke-width="4"/><circle cx="530" cy="780" r="12" fill="#e5e7eb" stroke="#111827" stroke-width="4"/><text x="475" y="788" font-family="Arial, sans-serif" font-size="25" font-weight="700" text-anchor="middle" fill="#ffffff">K</text><rect x="370" y="768" width="36" height="24" rx="5" fill="#fbbf24" stroke="#92400e" stroke-width="3"/><line x1="395" y1="763" x2="395" y2="797" stroke="#111827" stroke-width="7"/><line x1="420" y1="780" x2="406" y2="780" stroke="#374151" stroke-width="6"/>
    <rect x="600" y="740" width="80" height="80" rx="12" fill="#1f2937" stroke="#111827" stroke-width="4"/><circle cx="585" cy="780" r="12" fill="#e5e7eb" stroke="#111827" stroke-width="4"/><circle cx="695" cy="780" r="12" fill="#e5e7eb" stroke="#111827" stroke-width="4"/><text x="640" y="788" font-family="Arial, sans-serif" font-size="25" font-weight="700" text-anchor="middle" fill="#ffffff">L</text><rect x="550" y="768" width="36" height="24" rx="5" fill="#fbbf24" stroke="#92400e" stroke-width="3"/><line x1="575" y1="763" x2="575" y2="797" stroke="#111827" stroke-width="7"/><line x1="585" y1="780" x2="586" y2="780" stroke="#374151" stroke-width="6"/>
    <rect x="765" y="740" width="80" height="80" rx="12" fill="#1f2937" stroke="#111827" stroke-width="4"/><circle cx="750" cy="780" r="12" fill="#e5e7eb" stroke="#111827" stroke-width="4"/><circle cx="860" cy="780" r="12" fill="#e5e7eb" stroke="#111827" stroke-width="4"/><text x="805" y="788" font-family="Arial, sans-serif" font-size="25" font-weight="700" text-anchor="middle" fill="#ffffff">M</text><rect x="715" y="768" width="36" height="24" rx="5" fill="#fbbf24" stroke="#92400e" stroke-width="3"/><line x1="740" y1="763" x2="740" y2="797" stroke="#111827" stroke-width="7"/><line x1="750" y1="780" x2="751" y2="780" stroke="#374151" stroke-width="6"/>
  </g>

  <!-- legend and close-up -->
  <g transform="translate(1100,175)">
    <rect x="0" y="0" width="445" height="425" rx="22" fill="#ffffff" stroke="#64748b" stroke-width="4"/>
    <text x="222" y="48" font-family="Arial, sans-serif" font-size="27" font-weight="700" text-anchor="middle" fill="#111827">只看一个焊点</text>
    <rect x="135" y="105" width="180" height="150" rx="20" fill="#1f2937" stroke="#111827" stroke-width="5"/>
    <circle cx="115" cy="180" r="15" fill="#e5e7eb" stroke="#111827" stroke-width="5"/><circle cx="335" cy="180" r="15" fill="#e5e7eb" stroke="#111827" stroke-width="5"/>
    <rect x="55" y="168" width="42" height="25" rx="5" fill="#fbbf24" stroke="#92400e" stroke-width="3"/><line x1="82" y1="162" x2="82" y2="199" stroke="#111827" stroke-width="8"/>
    <line x1="97" y1="180" x2="115" y2="180" stroke="#f97316" stroke-width="8"/>
    <line x1="335" y1="180" x2="390" y2="180" stroke="#2563eb" stroke-width="8"/>
    <text x="76" y="135" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#92400e">二极管</text>
    <text x="82" y="230" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#b91c1c">黑环</text>
    <text x="390" y="155" font-family="Arial, sans-serif" font-size="19" fill="#1d4ed8">列线</text>
    <text x="222" y="302" font-family="Arial, sans-serif" font-size="21" text-anchor="middle" fill="#111827">左边：二极管黑环</text>
    <text x="222" y="335" font-family="Arial, sans-serif" font-size="21" text-anchor="middle" fill="#111827">右边：按键另一脚</text>
    <text x="222" y="368" font-family="Arial, sans-serif" font-size="21" text-anchor="middle" fill="#111827">每个焊点只放一点锡</text>
    <text x="222" y="405" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" fill="#b91c1c">不要把两个银色点焊成一坨</text>
  </g>

  <g transform="translate(1100,635)">
    <rect x="0" y="0" width="445" height="335" rx="22" fill="#ecfdf5" stroke="#059669" stroke-width="4"/>
    <text x="222" y="48" font-family="Arial, sans-serif" font-size="27" font-weight="700" text-anchor="middle" fill="#065f46">你现在的动作</text>
    <text x="35" y="105" font-family="Arial, sans-serif" font-size="23" fill="#065f46">1. 面板翻到背面</text>
    <text x="35" y="155" font-family="Arial, sans-serif" font-size="23" fill="#065f46">2. 找到按键两个银色点</text>
    <text x="35" y="205" font-family="Arial, sans-serif" font-size="23" fill="#065f46">3. 左边接二极管</text>
    <text x="35" y="255" font-family="Arial, sans-serif" font-size="23" fill="#065f46">4. 右边接蓝色列线</text>
    <text x="35" y="305" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#b91c1c">黑环永远朝橙色行线</text>
  </g>

  <defs>
    <marker id="arrow-red" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto"><path d="M0,0 L0,8 L11,4 z" fill="#b91c1c"/></marker>
  </defs>
</svg>
