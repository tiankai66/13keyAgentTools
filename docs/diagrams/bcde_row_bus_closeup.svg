<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="650" viewBox="0 0 1500 650">
  <rect width="1500" height="650" fill="#ffffff"/>
  <text x="60" y="62" font-family="Arial, sans-serif" font-size="40" font-weight="700" fill="#111827">B、C、D、E：共用一根 D5 橙色行线</text>
  <text x="60" y="105" font-family="Arial, sans-serif" font-size="23" fill="#475569">橙线连接的是四个二极管的黑环端；不要把四个按键针脚直接连在一起。</text>

  <!-- orange row bus -->
  <line x1="150" y1="450" x2="1330" y2="450" stroke="#f97316" stroke-width="16" stroke-linecap="round"/>
  <text x="150" y="510" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#c2410c">一根橙色 D5 行线</text>

  <!-- B -->
  <g transform="translate(100,170)">
    <rect x="80" y="80" width="170" height="110" rx="18" fill="#1f2937" stroke="#111827" stroke-width="5"/><text x="165" y="145" font-family="Arial, sans-serif" font-size="34" font-weight="700" text-anchor="middle" fill="#ffffff">B</text>
    <circle cx="65" cy="135" r="13" fill="#e5e7eb" stroke="#111827" stroke-width="5"/>
    <rect x="0" y="118" width="50" height="34" rx="7" fill="#fbbf24" stroke="#92400e" stroke-width="4"/><line x1="38" y1="110" x2="38" y2="160" stroke="#111827" stroke-width="9"/>
    <line x1="50" y1="135" x2="65" y2="135" stroke="#374151" stroke-width="8"/><line x1="38" y1="152" x2="38" y2="280" stroke="#f97316" stroke-width="8"/>
    <text x="25" y="75" font-family="Arial, sans-serif" font-size="20" font-weight="700" text-anchor="middle" fill="#92400e">二极管</text>
  </g>

  <!-- C -->
  <g transform="translate(400,170)">
    <rect x="80" y="80" width="170" height="110" rx="18" fill="#1f2937" stroke="#111827" stroke-width="5"/><text x="165" y="145" font-family="Arial, sans-serif" font-size="34" font-weight="700" text-anchor="middle" fill="#ffffff">C</text>
    <circle cx="65" cy="135" r="13" fill="#e5e7eb" stroke="#111827" stroke-width="5"/>
    <rect x="0" y="118" width="50" height="34" rx="7" fill="#fbbf24" stroke="#92400e" stroke-width="4"/><line x1="38" y1="110" x2="38" y2="160" stroke="#111827" stroke-width="9"/>
    <line x1="50" y1="135" x2="65" y2="135" stroke="#374151" stroke-width="8"/><line x1="38" y1="152" x2="38" y2="280" stroke="#f97316" stroke-width="8"/>
    <text x="25" y="75" font-family="Arial, sans-serif" font-size="20" font-weight="700" text-anchor="middle" fill="#92400e">二极管</text>
  </g>

  <!-- D -->
  <g transform="translate(700,170)">
    <rect x="80" y="80" width="170" height="110" rx="18" fill="#1f2937" stroke="#111827" stroke-width="5"/><text x="165" y="145" font-family="Arial, sans-serif" font-size="34" font-weight="700" text-anchor="middle" fill="#ffffff">D</text>
    <circle cx="65" cy="135" r="13" fill="#e5e7eb" stroke="#111827" stroke-width="5"/>
    <rect x="0" y="118" width="50" height="34" rx="7" fill="#fbbf24" stroke="#92400e" stroke-width="4"/><line x1="38" y1="110" x2="38" y2="160" stroke="#111827" stroke-width="9"/>
    <line x1="50" y1="135" x2="65" y2="135" stroke="#374151" stroke-width="8"/><line x1="38" y1="152" x2="38" y2="280" stroke="#f97316" stroke-width="8"/>
    <text x="25" y="75" font-family="Arial, sans-serif" font-size="20" font-weight="700" text-anchor="middle" fill="#92400e">二极管</text>
  </g>

  <!-- E -->
  <g transform="translate(1000,170)">
    <rect x="80" y="80" width="170" height="110" rx="18" fill="#1f2937" stroke="#111827" stroke-width="5"/><text x="165" y="145" font-family="Arial, sans-serif" font-size="34" font-weight="700" text-anchor="middle" fill="#ffffff">E</text>
    <circle cx="65" cy="135" r="13" fill="#e5e7eb" stroke="#111827" stroke-width="5"/>
    <rect x="0" y="118" width="50" height="34" rx="7" fill="#fbbf24" stroke="#92400e" stroke-width="4"/><line x1="38" y1="110" x2="38" y2="160" stroke="#111827" stroke-width="9"/>
    <line x1="50" y1="135" x2="65" y2="135" stroke="#374151" stroke-width="8"/><line x1="38" y1="152" x2="38" y2="280" stroke="#f97316" stroke-width="8"/>
    <text x="25" y="75" font-family="Arial, sans-serif" font-size="20" font-weight="700" text-anchor="middle" fill="#92400e">二极管</text>
  </g>

  <g transform="translate(80,570)">
    <rect x="0" y="0" width="1340" height="55" rx="15" fill="#ecfdf5" stroke="#059669" stroke-width="3"/>
    <text x="670" y="37" font-family="Arial, sans-serif" font-size="24" font-weight="700" text-anchor="middle" fill="#065f46">B/C/D/E 的二极管黑环端 → 同一根 D5 橙色行线；四个按键的另一侧分别去各自列线。</text>
  </g>
</svg>
