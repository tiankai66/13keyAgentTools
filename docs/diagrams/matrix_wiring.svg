<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <rect width="1200" height="800" fill="#f8fafc"/>
  <text x="55" y="55" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#0f172a">13 键矩阵焊接示意（按键面板背面）</text>
  <text x="55" y="90" font-family="Arial, sans-serif" font-size="18" fill="#475569">图中采用当前 CAD 的实际布局：左上 1 键 A，下面 4×3；同色总线最后各留一根线接 Arduino。</text>

  <g transform="translate(70,145)">
    <rect x="0" y="0" width="720" height="560" rx="22" fill="#ffffff" stroke="#64748b" stroke-width="4"/>
    <text x="360" y="-22" font-family="Arial, sans-serif" font-size="22" text-anchor="middle" fill="#334155">从焊接面看：编号只为防止接错</text>
    <g fill="#fb923c" stroke="#c2410c" stroke-width="3">
      <rect x="60" y="35" width="105" height="70" rx="10"/>
      <rect x="60" y="150" width="105" height="70" rx="10"/><rect x="180" y="150" width="105" height="70" rx="10"/><rect x="300" y="150" width="105" height="70" rx="10"/><rect x="420" y="150" width="105" height="70" rx="10"/>
      <rect x="60" y="265" width="105" height="70" rx="10"/><rect x="180" y="265" width="105" height="70" rx="10"/><rect x="300" y="265" width="105" height="70" rx="10"/><rect x="420" y="265" width="105" height="70" rx="10"/>
      <rect x="60" y="380" width="105" height="70" rx="10"/><rect x="180" y="380" width="105" height="70" rx="10"/><rect x="300" y="380" width="105" height="70" rx="10"/><rect x="420" y="380" width="105" height="70" rx="10"/>
    </g>
    <g font-family="Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle" fill="#7c2d12">
      <text x="112" y="80">A</text>
      <text x="112" y="195">B</text><text x="232" y="195">C</text><text x="352" y="195">D</text><text x="472" y="195">E</text>
      <text x="112" y="310">F</text><text x="232" y="310">G</text><text x="352" y="310">H</text><text x="472" y="310">I</text>
      <text x="112" y="425">J</text><text x="232" y="425">K</text><text x="352" y="425">L</text><text x="472" y="425">M</text>
    </g>
    <g stroke="#ea580c" stroke-width="7" fill="none">
      <path d="M35 70 H60"/><path d="M35 185 H60"/><path d="M35 300 H60"/><path d="M35 415 H60"/>
      <path d="M112 470 V500 M232 470 V500 M352 470 V500 M472 470 V500"/>
    </g>
    <g font-family="Arial, sans-serif" font-size="18" fill="#c2410c" font-weight="700">
      <text x="2" y="64">Row0 D4</text><text x="2" y="179">Row1 D5</text><text x="2" y="294">Row2 D6</text><text x="2" y="409">Row3 D7</text>
      <text x="76" y="535">Col0 D8</text><text x="196" y="535">Col1 D9</text><text x="316" y="535">Col2 D10</text><text x="436" y="535">Col3 D11</text>
    </g>
    <text x="610" y="520" font-family="Arial, sans-serif" font-size="17" text-anchor="middle" fill="#c2410c">A/B/F/J 共用 Col0</text>
  </g>

  <g transform="translate(850,145)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1e3a8a">分组接线表</text>
    <rect x="0" y="25" width="300" height="180" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/>
    <text x="18" y="58" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#1d4ed8">行线（经过二极管）</text>
    <text x="18" y="90" font-family="Arial, sans-serif" font-size="18" fill="#1e3a8a">D4：A</text><text x="18" y="120" font-family="Arial, sans-serif" font-size="18" fill="#1e3a8a">D5：B C D E</text><text x="18" y="150" font-family="Arial, sans-serif" font-size="18" fill="#1e3a8a">D6：F G H I</text><text x="18" y="180" font-family="Arial, sans-serif" font-size="18" fill="#1e3a8a">D7：J K L M</text>
    <rect x="0" y="230" width="300" height="180" rx="12" fill="#ecfeff" stroke="#0891b2" stroke-width="3"/>
    <text x="18" y="263" font-family="Arial, sans-serif" font-size="19" font-weight="700" fill="#0e7490">列线（按键另一侧）</text>
    <text x="18" y="295" font-family="Arial, sans-serif" font-size="18" fill="#155e75">D8：A B F J</text><text x="18" y="325" font-family="Arial, sans-serif" font-size="18" fill="#155e75">D9：C G K</text><text x="18" y="355" font-family="Arial, sans-serif" font-size="18" fill="#155e75">D10：D H L</text><text x="18" y="385" font-family="Arial, sans-serif" font-size="18" fill="#155e75">D11：E I M</text>
    <rect x="0" y="435" width="300" height="150" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="3"/>
    <text x="18" y="470" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#b91c1c">注意</text>
    <text x="18" y="501" font-family="Arial, sans-serif" font-size="17" fill="#991b1b">三处空位不装开关：</text>
    <text x="18" y="529" font-family="Arial, sans-serif" font-size="17" fill="#991b1b">Row0 Col1/2/3。</text>
    <text x="18" y="557" font-family="Arial, sans-serif" font-size="17" fill="#991b1b">二极管黑环统一朝行线。</text>
  </g>
</svg>
