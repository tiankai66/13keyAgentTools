<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1120" viewBox="0 0 1500 1120">
  <rect width="1500" height="1120" fill="#ffffff"/>
  <text x="60" y="70" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#111827">新手焊接速查：只照这张图做</text>
  <text x="60" y="112" font-family="Arial, sans-serif" font-size="23" fill="#4b5563">现在没有主板和灯带：先完成①②，给线贴好标签；主板到货后再做③。</text>

  <!-- Step 1 -->
  <rect x="55" y="155" width="1390" height="260" rx="22" fill="#eff6ff" stroke="#2563eb" stroke-width="4"/>
  <circle cx="110" cy="215" r="35" fill="#2563eb"/><text x="110" y="229" font-family="Arial, sans-serif" font-size="38" font-weight="700" text-anchor="middle" fill="#ffffff">1</text>
  <text x="170" y="220" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#1e3a8a">一颗按键这样焊</text>
  <text x="170" y="255" font-family="Arial, sans-serif" font-size="20" fill="#1e40af">按键只有 2 个脚，两个脚可以互换；二极管是另外串联的元件。</text>
  <line x1="170" y1="340" x2="395" y2="340" stroke="#2563eb" stroke-width="10"/>
  <text x="170" y="315" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#1d4ed8">列线 D8/D9/D10/D11</text>
  <rect x="395" y="285" width="300" height="110" rx="18" fill="#1f2937" stroke="#111827" stroke-width="5"/>
  <circle cx="395" cy="340" r="13" fill="#d1d5db" stroke="#111827" stroke-width="4"/><circle cx="695" cy="340" r="13" fill="#d1d5db" stroke="#111827" stroke-width="4"/>
  <text x="545" y="335" font-family="Arial, sans-serif" font-size="27" font-weight="700" text-anchor="middle" fill="#ffffff">两针按键</text>
  <text x="545" y="370" font-family="Arial, sans-serif" font-size="20" text-anchor="middle" fill="#d1d5db">两脚无正负</text>
  <line x1="695" y1="340" x2="790" y2="340" stroke="#374151" stroke-width="10"/>
  <polygon points="790,305 790,375 875,340" fill="#f59e0b" stroke="#92400e" stroke-width="4"/>
  <line x1="875" y1="298" x2="875" y2="382" stroke="#111827" stroke-width="12"/>
  <line x1="875" y1="340" x2="980" y2="340" stroke="#ea580c" stroke-width="10"/>
  <text x="835" y="285" font-family="Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle" fill="#92400e">1N4148</text>
  <text x="875" y="415" font-family="Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle" fill="#b91c1c">黑环朝右</text>
  <text x="1010" y="315" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#c2410c">行线 D4/D5/D6/D7</text>
  <text x="1010" y="365" font-family="Arial, sans-serif" font-size="23" fill="#991b1b">二极管黑环这一端</text>
  <path d="M970 340 H1000" stroke="#b91c1c" stroke-width="4" marker-end="url(#arrow-red)"/>

  <!-- Step 2 -->
  <rect x="55" y="445" width="1390" height="355" rx="22" fill="#fff7ed" stroke="#ea580c" stroke-width="4"/>
  <circle cx="110" cy="505" r="35" fill="#ea580c"/><text x="110" y="519" font-family="Arial, sans-serif" font-size="38" font-weight="700" text-anchor="middle" fill="#ffffff">2</text>
  <text x="170" y="510" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#9a3412">13 个按键这样分组</text>
  <text x="170" y="545" font-family="Arial, sans-serif" font-size="20" fill="#9a3412">每个方框 = 1 个两针按键 + 1 个二极管。先焊二极管，再焊总线。</text>
  <g transform="translate(180,580)">
    <g fill="#fed7aa" stroke="#ea580c" stroke-width="3">
      <rect x="0" y="0" width="125" height="65" rx="10"/>
      <rect x="0" y="82" width="125" height="65" rx="10"/><rect x="145" y="82" width="125" height="65" rx="10"/><rect x="290" y="82" width="125" height="65" rx="10"/><rect x="435" y="82" width="125" height="65" rx="10"/>
      <rect x="0" y="164" width="125" height="65" rx="10"/><rect x="145" y="164" width="125" height="65" rx="10"/><rect x="290" y="164" width="125" height="65" rx="10"/><rect x="435" y="164" width="125" height="65" rx="10"/>
      <rect x="0" y="246" width="125" height="65" rx="10"/><rect x="145" y="246" width="125" height="65" rx="10"/><rect x="290" y="246" width="125" height="65" rx="10"/><rect x="435" y="246" width="125" height="65" rx="10"/>
    </g>
    <g font-family="Arial, sans-serif" font-size="25" font-weight="700" text-anchor="middle" fill="#7c2d12">
      <text x="62" y="42">A</text>
      <text x="62" y="124">B</text><text x="207" y="124">C</text><text x="352" y="124">D</text><text x="497" y="124">E</text>
      <text x="62" y="206">F</text><text x="207" y="206">G</text><text x="352" y="206">H</text><text x="497" y="206">I</text>
      <text x="62" y="288">J</text><text x="207" y="288">K</text><text x="352" y="288">L</text><text x="497" y="288">M</text>
    </g>
    <g font-family="Arial, sans-serif" font-size="21" font-weight="700">
      <text x="-155" y="42" fill="#c2410c">D4 行</text><text x="-155" y="124" fill="#c2410c">D5 行</text><text x="-155" y="206" fill="#c2410c">D6 行</text><text x="-155" y="288" fill="#c2410c">D7 行</text>
      <text x="30" y="345" fill="#1d4ed8">D8 列</text><text x="175" y="345" fill="#1d4ed8">D9 列</text><text x="320" y="345" fill="#1d4ed8">D10 列</text><text x="465" y="345" fill="#1d4ed8">D11 列</text>
    </g>
  </g>
  <text x="875" y="640" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#9a3412">橙色：行线（接二极管黑环）</text>
  <text x="875" y="685" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#1d4ed8">蓝色：列线（接按键另一侧）</text>
  <text x="875" y="730" font-family="Arial, sans-serif" font-size="22" fill="#7c2d12">每组最后留一根 10–15cm 线尾</text>

  <!-- Step 3 -->
  <rect x="55" y="830" width="1390" height="235" rx="22" fill="#ecfdf5" stroke="#059669" stroke-width="4"/>
  <circle cx="110" cy="890" r="35" fill="#059669"/><text x="110" y="904" font-family="Arial, sans-serif" font-size="38" font-weight="700" text-anchor="middle" fill="#ffffff">3</text>
  <text x="170" y="895" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#065f46">主板到货后，线尾这样接</text>
  <g font-family="Arial, sans-serif" font-size="23" font-weight="700">
    <text x="170" y="945" fill="#c2410c">D4 行0</text><text x="350" y="945" fill="#c2410c">D5 行1</text><text x="530" y="945" fill="#c2410c">D6 行2</text><text x="710" y="945" fill="#c2410c">D7 行3</text>
    <text x="170" y="995" fill="#1d4ed8">D8 列0</text><text x="350" y="995" fill="#1d4ed8">D9 列1</text><text x="530" y="995" fill="#1d4ed8">D10 列2</text><text x="710" y="995" fill="#1d4ed8">D11 列3</text>
    <text x="980" y="945" fill="#7c3aed">旋钮：A→D2，B→D3</text><text x="980" y="995" fill="#7c3aed">按下：SW→D12</text>
  </g>
  <text x="170" y="1040" font-family="Arial, sans-serif" font-size="20" fill="#065f46">现在先不要接 USB；每根线先贴标签。RGB 灯带和主板到货后再看这一栏。</text>

  <defs>
    <marker id="arrow-red" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto"><path d="M0,0 L0,8 L11,4 z" fill="#b91c1c"/></marker>
  </defs>
</svg>
