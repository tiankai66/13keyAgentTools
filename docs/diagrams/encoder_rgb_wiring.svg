<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <rect width="1200" height="700" fill="#f8fafc"/>
  <text x="55" y="55" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#0f172a">旋钮、主控与 12 颗 RGB 灯接线</text>
  <text x="55" y="90" font-family="Arial, sans-serif" font-size="18" fill="#475569">主板和灯带还没到时，只焊好面板端并给每根线贴标签；不要把裸线接到 USB。</text>

  <g transform="translate(55,145)">
    <rect x="0" y="0" width="330" height="455" rx="20" fill="#1e293b" stroke="#0f172a" stroke-width="4"/>
    <text x="165" y="52" font-family="Arial, sans-serif" font-size="27" font-weight="700" text-anchor="middle" fill="#e2e8f0">Arduino Micro</text>
    <text x="165" y="82" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#94a3b8">USB-C / 5V</text>
    <g font-family="Arial, sans-serif" font-size="22" font-weight="700">
      <rect x="38" y="125" width="252" height="48" rx="8" fill="#312e81"/><text x="60" y="157" fill="#ddd6fe">D2</text><text x="120" y="157" fill="#ddd6fe">EC11 A</text>
      <rect x="38" y="185" width="252" height="48" rx="8" fill="#312e81"/><text x="60" y="217" fill="#ddd6fe">D3</text><text x="120" y="217" fill="#ddd6fe">EC11 B</text>
      <rect x="38" y="245" width="252" height="48" rx="8" fill="#312e81"/><text x="60" y="277" fill="#ddd6fe">D12</text><text x="120" y="277" fill="#ddd6fe">EC11 SW</text>
      <rect x="38" y="305" width="252" height="48" rx="8" fill="#fef3c7"/><text x="60" y="337" fill="#92400e">A3</text><text x="120" y="337" fill="#92400e">RGB DIN</text>
      <rect x="38" y="365" width="116" height="48" rx="8" fill="#fee2e2"/><text x="75" y="397" fill="#b91c1c">5V</text>
      <rect x="174" y="365" width="116" height="48" rx="8" fill="#e5e7eb"/><text x="203" y="397" fill="#374151">GND</text>
    </g>
  </g>

  <g transform="translate(470,145)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#6d28d9">A. 立式 EC11（轴穿过 Ø6.2mm 孔）</text>
    <rect x="0" y="28" width="300" height="180" rx="18" fill="#e5e7eb" stroke="#6b7280" stroke-width="3"/>
    <circle cx="150" cy="92" r="32" fill="#9ca3af" stroke="#374151" stroke-width="4"/>
    <rect x="110" y="120" width="80" height="55" rx="5" fill="#4b5563"/>
    <text x="150" y="238" font-family="Arial, sans-serif" font-size="19" text-anchor="middle" fill="#4b5563">本体在面板下</text>
    <g font-family="Arial, sans-serif" font-size="18" fill="#6d28d9">
      <text x="350" y="70">A → D2</text><text x="350" y="105">B → D3</text><text x="350" y="140">C → GND</text><text x="350" y="175">SW1 → D12</text><text x="350" y="210">SW2 → GND</text>
    </g>
    <text x="0" y="285" font-family="Arial, sans-serif" font-size="17" fill="#7c3aed">脚位顺序每家可能不同：先用万用表找 C 和 SW 两对脚。</text>
  </g>

  <g transform="translate(470,490)">
    <text x="0" y="0" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#b45309">B. 12 颗独立 RGB 灯（串联数据，电源并联）</text>
    <line x1="35" y1="73" x2="80" y2="73" stroke="#f59e0b" stroke-width="6"/>
    <rect x="80" y="49" width="65" height="48" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="3"/>
    <text x="112" y="80" font-family="Arial, sans-serif" font-size="18" text-anchor="middle" fill="#92400e">A3</text>
    <rect x="155" y="49" width="75" height="48" rx="8" fill="#fde68a" stroke="#b45309" stroke-width="3"/>
    <text x="192" y="80" font-family="Arial, sans-serif" font-size="17" text-anchor="middle" fill="#92400e">330Ω</text>
    <g fill="#22d3ee" stroke="#0891b2" stroke-width="2">
      <rect x="250" y="49" width="42" height="48" rx="6"/><rect x="306" y="49" width="42" height="48" rx="6"/><rect x="362" y="49" width="42" height="48" rx="6"/><rect x="418" y="49" width="42" height="48" rx="6"/><rect x="474" y="49" width="42" height="48" rx="6"/><rect x="530" y="49" width="42" height="48" rx="6"/>
      <rect x="586" y="49" width="42" height="48" rx="6"/><rect x="642" y="49" width="42" height="48" rx="6"/><rect x="698" y="49" width="42" height="48" rx="6"/>
    </g>
    <g stroke="#f59e0b" stroke-width="5" fill="none">
      <path d="M230 73 H250 M292 73 H306 M348 73 H362 M404 73 H418 M460 73 H474 M516 73 H530 M572 73 H586 M628 73 H642 M684 73 H698"/>
    </g>
    <text x="270" y="132" font-family="Arial, sans-serif" font-size="18" fill="#92400e">DIN → DOUT → DIN → …</text>
    <line x1="250" y1="30" x2="740" y2="30" stroke="#dc2626" stroke-width="5"/><text x="750" y="36" font-family="Arial, sans-serif" font-size="17" fill="#b91c1c">5V（并联）</text>
    <line x1="250" y1="158" x2="740" y2="158" stroke="#374151" stroke-width="5"/><text x="750" y="164" font-family="Arial, sans-serif" font-size="17" fill="#374151">GND（并联）</text>
    <text x="0" y="205" font-family="Arial, sans-serif" font-size="17" fill="#475569">电解电容：1000µF，正极接 5V，负极接 GND，靠近灯带电源入口。</text>
  </g>
</svg>
