<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="700" viewBox="0 0 1400 700">
  <rect width="1400" height="700" fill="#ffffff"/>
  <text x="60" y="65" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#111827">B 键放大图：两个针脚各走一条路</text>
  <text x="60" y="108" font-family="Arial, sans-serif" font-size="24" fill="#475569">B 右侧针脚只接蓝色列线；二极管接在 B 左侧针脚，不要接到同一个焊点。</text>

  <!-- B switch body -->
  <rect x="440" y="230" width="360" height="190" rx="26" fill="#1f2937" stroke="#111827" stroke-width="6"/>
  <rect x="505" y="275" width="230" height="100" rx="16" fill="#374151"/>
  <text x="620" y="340" font-family="Arial, sans-serif" font-size="44" font-weight="700" text-anchor="middle" fill="#ffffff">B 按键</text>
  <circle cx="410" cy="325" r="19" fill="#e5e7eb" stroke="#111827" stroke-width="6"/>
  <circle cx="830" cy="325" r="19" fill="#e5e7eb" stroke="#111827" stroke-width="6"/>
  <text x="410" y="205" font-family="Arial, sans-serif" font-size="24" font-weight="700" text-anchor="middle" fill="#111827">左针脚</text>
  <text x="830" y="205" font-family="Arial, sans-serif" font-size="24" font-weight="700" text-anchor="middle" fill="#111827">右针脚</text>

  <!-- left diode -->
  <line x1="410" y1="325" x2="340" y2="325" stroke="#374151" stroke-width="12"/>
  <rect x="230" y="293" width="110" height="64" rx="12" fill="#fbbf24" stroke="#92400e" stroke-width="5"/>
  <line x1="310" y1="283" x2="310" y2="367" stroke="#111827" stroke-width="14"/>
  <text x="285" y="255" font-family="Arial, sans-serif" font-size="23" font-weight="700" text-anchor="middle" fill="#92400e">1N4148</text>
  <text x="310" y="400" font-family="Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle" fill="#b91c1c">黑环</text>
  <line x1="230" y1="325" x2="110" y2="325" stroke="#f97316" stroke-width="12"/>
  <text x="105" y="285" font-family="Arial, sans-serif" font-size="27" font-weight="700" text-anchor="middle" fill="#c2410c">橙色行线 D5</text>
  <text x="105" y="375" font-family="Arial, sans-serif" font-size="22" text-anchor="middle" fill="#9a3412">接二极管黑环端</text>

  <!-- right column -->
  <line x1="830" y1="325" x2="970" y2="325" stroke="#2563eb" stroke-width="12"/>
  <text x="1090" y="285" font-family="Arial, sans-serif" font-size="27" font-weight="700" text-anchor="middle" fill="#1d4ed8">蓝色列线 D8</text>
  <text x="1090" y="375" font-family="Arial, sans-serif" font-size="22" text-anchor="middle" fill="#1e40af">B 属于第 0 列</text>

  <!-- three separate joints -->
  <g font-family="Arial, sans-serif" font-size="22" font-weight="700" text-anchor="middle">
    <circle cx="410" cy="500" r="28" fill="#059669"/><text x="410" y="508" fill="#ffffff">①</text>
    <circle cx="310" cy="500" r="28" fill="#059669"/><text x="310" y="508" fill="#ffffff">②</text>
    <circle cx="830" cy="500" r="28" fill="#059669"/><text x="830" y="508" fill="#ffffff">③</text>
    <text x="410" y="555" fill="#065f46">B 左针脚 + 二极管一端</text>
    <text x="310" y="605" fill="#065f46">二极管黑环端 + D5 行线</text>
    <text x="830" y="555" fill="#065f46">B 右针脚 + D8 蓝线</text>
  </g>
  <rect x="80" y="640" width="1240" height="42" rx="12" fill="#fef2f2" stroke="#dc2626" stroke-width="3"/>
  <text x="700" y="669" font-family="Arial, sans-serif" font-size="23" font-weight="700" text-anchor="middle" fill="#b91c1c">结论：B 右针脚不接二极管；每个按键的两个针脚各自只负责一条路径。</text>
</svg>
