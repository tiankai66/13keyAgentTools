name: Validate project files

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Python syntax
        run: python3 -m py_compile host/agentd/agentd.py mechanical/tools/generate_stl.py

      - name: Check required project files
        run: |
          test -f README.md
          test -f mechanical/cad/agent_macro.scad
          test -f hardware/wiring/README.md
          test -f firmware/arduino/agent_macro_mvp/agent_macro_mvp.ino
          test -f host/agentd/agentd.py
          test -f mechanical/tools/generate_stl.py
